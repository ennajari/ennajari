<svg xmlns="http://www.w3.org/2000/svg" width="580" height="320" viewBox="0 0 580 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card"><rect width="580" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background -->
    <rect width="580" height="320" fill="url(#bg)"/>
    <rect x="0" y="0" width="580" height="1" fill="url(#accent-line)"/>

    <!-- Header -->
    <g transform="translate(24, 28)">
      <circle cx="10" cy="10" r="10" fill="#58A6FF" opacity="0.15"/><circle cx="9" cy="9" r="4" fill="none" stroke="#58A6FF" stroke-width="1.5"/><line x1="12" y1="12" x2="16" y2="16" stroke="#58A6FF" stroke-width="1.5"/>
      <text x="32" y="4" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#E6EDF3">PageIndex</text>
      <text x="32" y="22" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#8B949E">Document Index for Vectorless RAG</text>
    </g>

    <!-- Tag -->
    <rect x="480" y="18" width="80" height="22" rx="11" fill="#58A6FF" opacity="0.15"/>
    <text x="520" y="33" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#58A6FF">NLP</text>

    <!-- Divider -->
    <line x1="24" y1="58" x2="556" y2="58" stroke="#30363D" stroke-width="1"/>

    <!-- Content -->
    <g transform="translate(0, 68)">
      <text x="30" y="12" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">ARCHITECTURE VECTORLESS RAG</text>
      <rect x="30" y="22" width="90" height="36" rx="6" fill="#3FB950" opacity="0.12" stroke="#3FB950" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="75.0" y="40.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#3FB950">Documents</text>
      <text x="75.0" y="54.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">PDF / TXT / MD</text>
      <line x1="120" y1="40" x2="150" y2="40" stroke="#3FB950" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
      <rect x="150" y="22" width="110" height="36" rx="6" fill="#58A6FF" opacity="0.12" stroke="#58A6FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="205.0" y="40.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#58A6FF">Page Indexer</text>
      <text x="205.0" y="54.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">Chunking + Metadata</text>
      <line x1="260" y1="40" x2="290" y2="40" stroke="#58A6FF" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
      <rect x="290" y="22" width="120" height="36" rx="6" fill="#D2A8FF" opacity="0.12" stroke="#D2A8FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="350.0" y="40.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#D2A8FF">Reasoning Engine</text>
      <text x="350.0" y="54.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">LLM-based retrieval</text>
      <line x1="410" y1="40" x2="440" y2="40" stroke="#D2A8FF" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
      <rect x="440" y="22" width="110" height="36" rx="6" fill="#F78166" opacity="0.12" stroke="#F78166" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="495.0" y="40.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#F78166">Response</text>
      <text x="495.0" y="54.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">Contextual answer</text>
      <text x="30" y="82" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">INNOVATION CLEE</text>
      <rect x="30" y="92" width="175" height="28" rx="6" fill="#3FB950" opacity="0.12" stroke="#3FB950" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="117.5" y="106.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#3FB950">Sans Base Vectorielle</text>
      <text x="117.5" y="120.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">Pas de FAISS / ChromaDB</text>
      <rect x="215" y="92" width="165" height="28" rx="6" fill="#58A6FF" opacity="0.12" stroke="#58A6FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="297.5" y="110.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#58A6FF">Raisonnement LLM pur</text>
      <rect x="390" y="92" width="160" height="28" rx="6" fill="#D2A8FF" opacity="0.12" stroke="#D2A8FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="470.0" y="110.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#D2A8FF">Index Page structuree</text>
      <text x="30" y="142" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">STACK</text>
      <rect x="30" y="152" width="100" height="24" rx="6" fill="#58A6FF" opacity="0.12" stroke="#58A6FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="80.0" y="168.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#58A6FF">Python</text>
      <rect x="140" y="152" width="100" height="24" rx="6" fill="#D2A8FF" opacity="0.12" stroke="#D2A8FF" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="190.0" y="168.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#D2A8FF">LangChain</text>
      <rect x="250" y="152" width="120" height="24" rx="6" fill="#3FB950" opacity="0.12" stroke="#3FB950" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="310.0" y="168.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#3FB950">OpenAI / Gemini</text>
      <rect x="380" y="152" width="170" height="24" rx="6" fill="#F78166" opacity="0.12" stroke="#F78166" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="465.0" y="168.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#F78166">Document Parsing</text>
      <text x="50" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#3FB950">0</text>
      <text x="50" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Vecteurs requis</text>
      <text x="170" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#D2A8FF">LLM</text>
      <text x="170" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Raisonnement pur</text>
      <text x="310" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#58A6FF">Multi</text>
      <text x="310" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Formats docs</text>
      <text x="430" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#F78166">RAG</text>
      <text x="430" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Sans index dense</text>
    </g>
  </g>

  <!-- Border -->
  <rect width="580" height="320" rx="16" fill="none" stroke="#30363D" stroke-width="1"/>
</svg>